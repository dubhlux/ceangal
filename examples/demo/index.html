<!DOCTYPE html>
<html lang="en">
<head>
  <title>ceangal — UI framework demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    .canvas-container {
      position: relative;
      width: min(calc(100vw - 32px), calc(100vh - 32px));
      height: min(calc(100vw - 32px), calc(100vh - 32px));
    }
    canvas { width: 100%; height: 100%; display: block; cursor: default; }
    .text-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
    }
    .text-overlay span, .text-overlay h1, .text-overlay h2, .text-overlay h3 {
      position: absolute;
      pointer-events: auto;
      cursor: text;
      color: transparent;
      -webkit-user-select: text;
      user-select: text;
      white-space: nowrap;
      line-height: 1.3;
    }
    .text-overlay span::selection, .text-overlay h1::selection,
    .text-overlay h2::selection, .text-overlay h3::selection {
      background: rgba(66, 133, 244, 0.4);
      color: inherit;
    }
    .input-area {
      position: absolute;
      pointer-events: auto;
      cursor: text;
      overflow: hidden;
    }
    .input-area .input-display {
      font-family: sans-serif;
      white-space: pre;
      min-height: 1.2em;
      color: #333;
      line-height: 1.2;
    }
    .input-area .placeholder { color: #999; font-style: italic; }
    .ime-textarea {
      position: absolute;
      color: transparent;
      caret-color: transparent;
      background: transparent;
      border: none; outline: none; resize: none;
      overflow: hidden;
      font-family: sans-serif;
      font-size: 11px;
      line-height: 1.2;
      padding: 0; margin: 0;
      pointer-events: none;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="canvas-container" id="container">
    <canvas id="canvas" width="512" height="512"></canvas>
    <div id="text-overlay" class="text-overlay"></div>
    <textarea id="ime-input" class="ime-textarea" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" rows="1"></textarea>
  </div>
  <script type="module">
    import { init } from "./ceangal_runtime.js";
    // Clear text selection when clicking outside text elements
    document.getElementById("canvas").addEventListener("mousedown", () => {
      window.getSelection()?.removeAllRanges();
    });
    init(
      "./ceangal.wasm?v=" + Date.now(),
      document.getElementById("canvas"),
      document.getElementById("text-overlay"),
      document.getElementById("ime-input"),
    ).catch(e => { document.body.textContent = e.message; console.error(e); });
  </script>
</body>
</html>
